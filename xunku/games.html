<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="05游戏 · Nebula Tech 游戏中心 —— 精选在线游戏，即刻畅玩">
  <meta name="theme-color" content="#0a0a0f">
  <meta property="og:title" content="05游戏 · Nebula Tech">
  <meta property="og:description" content="精选在线游戏，即刻畅玩">
  <meta property="og:type" content="website">
  <title>05游戏 · Nebula Tech</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="games.css">
</head>
<body>
  <div id="nav-placeholder"></div>
  <div id="search-placeholder"></div>

  <main>
    <!-- Hero -->
    <section class="games-hero">
      <div class="games-hero-bg"></div>
      <div class="games-hero-content">
        <div class="hero-badge">
          <span class="badge-dot"></span> GAME CENTER
        </div>
        <h1 class="games-hero-title">
          <span class="title-num">05</span>
          <span class="title-text">游戏</span>
        </h1>
        <p class="games-hero-desc">
          精选在线游戏 · 无需下载 · 即刻畅玩<br>
          工作学习之余，来一局放松一下
        </p>
      </div>
      <div class="games-hero-deco">
        <div class="deco-crosshair"></div>
        <div class="deco-rings">
          <div class="deco-ring r1"></div>
          <div class="deco-ring r2"></div>
          <div class="deco-ring r3"></div>
        </div>
      </div>
    </section>

    <!-- 游戏列表 -->
    <section class="games-grid-section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="title-prefix">// 游戏库</span>
          全部游戏
        </h2>
        <div class="section-line"></div>
        <span class="game-count">1 款游戏</span>
      </div>

      <div class="games-grid">

        <!-- Dust2 FPS -->
        <div class="game-card featured-game">
          <div class="game-card-media">
            <div class="game-card-img dust2-bg">
              <div class="game-overlay">
                <div class="game-overlay-tags">
                  <span class="game-tag">FPS</span>
                  <span class="game-tag">射击</span>
                  <span class="game-tag">3D</span>
                </div>
              </div>
            </div>
            <div class="game-card-badge">🔥 热门</div>
          </div>
          <div class="game-card-body">
            <div class="game-card-header">
              <h3 class="game-title">Dust2 FPS</h3>
              <div class="game-rating">
                <span class="star full">★</span><span class="star full">★</span><span class="star full">★</span><span class="star">★</span><span class="star">★</span>
              </div>
            </div>
            <p class="game-desc">
              基于 Three.js 构建的 CS 风格 3D FPS 网页游戏。Dust2 经典地图，
              WASD 移动、鼠标射击、实时 HUD。无需安装，打开浏览器就能玩。
            </p>
            <div class="game-meta">
              <span class="game-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                v1.0
              </span>
              <span class="game-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                快节奏
              </span>
              <span class="game-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
                浏览器
              </span>
            </div>
            <a href="https://game.sjbhpgp.cn" class="game-play-btn" target="_blank">
              <span>🎯 立即游玩</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5,3 19,12 5,21"/>
              </svg>
            </a>
          </div>
        </div>

        <!-- 占位: 即将上线 -->
        <div class="game-card coming-soon">
          <div class="game-card-media">
            <div class="game-card-img placeholder-bg">
              <div class="game-overlay">
                <span class="coming-label">即将上线</span>
              </div>
            </div>
          </div>
          <div class="game-card-body">
            <div class="game-card-header">
              <h3 class="game-title dim">新游戏开发中</h3>
            </div>
            <p class="game-desc dim">
              更多有趣的网页游戏正在开发中，敬请期待...
            </p>
            <div class="game-meta">
              <span class="game-meta-item dim">???</span>
            </div>
            <button class="game-play-btn disabled" disabled>
              <span>🔒 敬请期待</span>
            </button>
          </div>
        </div>

        <div class="game-card coming-soon">
          <div class="game-card-media">
            <div class="game-card-img placeholder-bg2">
              <div class="game-overlay">
                <span class="coming-label">即将上线</span>
              </div>
            </div>
          </div>
          <div class="game-card-body">
            <div class="game-card-header">
              <h3 class="game-title dim">新游戏开发中</h3>
            </div>
            <p class="game-desc dim">
              更多有趣的网页游戏正在开发中，敬请期待...
            </p>
            <div class="game-meta">
              <span class="game-meta-item dim">???</span>
            </div>
            <button class="game-play-btn disabled" disabled>
              <span>🔒 敬请期待</span>
            </button>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="components.js"></script>
  <script src="api.js"></script>
</body>
</html>
